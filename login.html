<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Вход</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;min-height:100vh">
<div class="container" style="max-width:400px">
  <div style="padding:30px;text-align:center">
    <h2>🔐 Вход в систему</h2>
    <form id="login-form" style="margin-top:20px">
      <div class="form-group"><input type="text" id="username" placeholder="Логин" required></div>
      <div class="form-group"><input type="password" id="password" placeholder="Пароль" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
    </form>
    <p id="login-msg" class="status" style="margin-top:10px"></p>
  </div>
</div>
<script>
document.getElementById('login-form').onsubmit = async e => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const msg = document.getElementById('login-msg');
    msg.textContent = 'Проверка...'; msg.className = 'status';

    try {
        const res = await fetch('api/auth.php?action=login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p }),
            credentials: 'include' // ← КРИТИЧНО ДЛЯ СОХРАНЕНИЯ СЕССИИ
        });

        const text = await res.text();
        let d;
        try { d = JSON.parse(text); } catch { throw new Error('Сервер вернул не JSON'); }

        if (res.ok) {
            msg.textContent = '✅ Успех! Загрузка...';
            msg.className = 'status success';
            setTimeout(() => window.location.href = 'index.html', 800);
        } else {
            msg.textContent = d.error || 'Ошибка входа';
            msg.className = 'status error';
        }
    } catch (err) {
        msg.textContent = '⚠️ Ошибка сети: ' + err.message;
        msg.className = 'status error';
        console.error('Login error:', err);
    }
};
</script>
</body>
</html>
