<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Этикетка</title><style>body{margin:0;padding:10px;font-family:Arial,sans-serif}.label{width:100px;height:60px;border:1px solid #000;padding:4px;page-break-inside:avoid;display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center}.barcode{font-size:10px;word-break:break-all}.name{font-size:8px;font-weight:bold}.qty{font-size:9px}</style></head><body><div class="label" id="lbl"><div class="barcode" id="lb-code"></div><div class="name" id="lb-name"></div><div class="qty" id="lb-qty"></div></div><script>const p=new URLSearchParams(location.search);document.getElementById('lb-code').textContent=p.get('code')||'';document.getElementById('lb-name').textContent=p.get('name')||'';document.getElementById('lb-qty').textContent='Кол-во: '+(p.get('qty')||'1');window.onload=()=>window.print();</script></body></html>
