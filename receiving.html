<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Приемка</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="container"><header><h1>📥 Приемка</h1><nav><a href="index.html" class="btn">🏠</a><span id="user-role" style="font-size:12px;margin-right:10px"></span><button id="voice-btn" class="btn btn-voice">🎤 Голос</button><button id="logout-btn" class="btn auth-only" onclick="fetch('api/auth.php?action=logout',{method:'POST'}).then(()=>window.location.href='login.html')">🚪</button></nav></header><main><div class="scanner-section"><label>📷 Штрихкод:</label><input type="text" id="barcode" autofocus placeholder="Сканируйте или скажите: сканировать 4607..." autocomplete="off"><div id="scan-status" class="status"></div><div class="search-bar"><input type="text" id="search-items" placeholder="🔍 Поиск в партии..."></div><div class="batch-info"><b>Партия:</b> <span id="batchNumber">-</span> | <b>Товаров:</b> <span id="itemsCount">0</span><br><button id="completeBatch" class="btn btn-success">✅ Завершить</button><button id="newBatch" class="btn btn-warning">🔄 Новая</button><button id="export-btn" class="btn btn-secondary" onclick="window.open('api/export.php?type=receiving&batch_id='+batch?.id,'_blank')">📥 CSV</button></div></div><div><h2>📋 Товары</h2><table><thead><tr><th>Штрихкод</th><th>Название</th><th>Кол-во</th><th>Время</th><th>Статус</th></tr></thead><tbody id="itemsBody"></tbody></table></div></main></div><script src="assets/app.js"></script><script src="assets/voice.js"></script><script>
let batch=null,items=[],poller=null;
const loadBatch=async()=>{try{batch=await App.req('receiving.php?action=active-batch');if(!batch)await createBatch();else{loadItems();updateUI()}}catch(e){status('Ошибка: '+e.message,'error')}};
const createBatch=async()=>{batch=await App.req('receiving.php?action=create-batch',{method:'POST',body:JSON.stringify({batchNumber:'RCV-'+Date.now()})});items=[];updateUI();status('Новая партия','success')};
const scan=async(b)=>{try{status('Сканирование...','success');const r=await App.req('receiving.php?action=scan',{method:'POST',body:JSON.stringify({barcode:b,batchId:batch?.id})});if(r.success){batch=r.batch;status(r.isNew?`✅ Создан: ${b}`:`✅ ${r.item.name}`,'success');loadItems()}}catch(e){status('❌ '+e.message,'error')}};
const loadItems=async()=>{const q=document.getElementById('search-items').value;items=await App.req(`receiving.php?action=batch-items&batch_id=${batch.id}&search=${encodeURIComponent(q)}`);const tb=document.getElementById('itemsBody');if(!tb)return;tb.innerHTML=items.map(i=>`<tr><td>${i.barcode}</td><td>${i.name} ${i.is_draft?'<span style="background:#ff9800;color:#fff;padding:2px 6px;border-radius:3px;font-size:11px">Новый</span>':''}</td><td><b>${i.quantity}</b></td><td>${new Date(i.last_scanned_at).toLocaleString('ru-RU')}</td><td>${i.is_draft?'Черновик':'ОК'}</td></tr>`).join('')};
const updateUI=()=>{document.getElementById('batchNumber').textContent=batch?.batch_number||'-';document.getElementById('itemsCount').textContent=items.reduce((s,i)=>s+i.quantity,0)};
const complete=async()=>{if(!batch||items.length===0)return status('Партия пуста','error');if(!confirm('Завершить?'))return;const fd=new FormData();fd.append('batch_id',batch.id);fd.append('location_id','MAIN');await App.req('receiving.php?action=complete-batch',{method:'POST',body:fd});status('✅ Завершено','success');setTimeout(createBatch,1000)};
const status=(m,t)=>{const el=document.getElementById('scan-status');if(!el)return alert(m);el.textContent=m;el.className='status '+t;setTimeout(()=>{el.textContent='';el.className='status'},3000)};
document.addEventListener('DOMContentLoaded',async()=>{const inp=document.getElementById('barcode');await loadBatch();inp?.addEventListener('keypress',e=>{if(e.key==='Enter'&&inp.value.trim()){scan(inp.value.trim());inp.value=''}});document.getElementById('completeBatch')?.addEventListener('click',complete);document.getElementById('newBatch')?.addEventListener('click',createBatch);poller=App.poll(2000,()=>{if(batch){loadItems();updateUI()}});document.addEventListener('click',()=>inp?.focus());document.getElementById('search-items')?.addEventListener('input',loadItems)});
</script></body></html>
