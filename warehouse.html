<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Склад</title><link rel="stylesheet" href="assets/style.css"></head>
<body><div class="container"><header><h1>🏭 Склад</h1><nav><a href="index.html" class="btn">🏠</a><span id="user-role" style="font-size:12px;margin-right:10px"></span><button id="voice-btn" class="btn btn-voice">🎤 Голос</button><button id="logout-btn" class="btn auth-only" onclick="fetch('api/auth.php?action=logout',{method:'POST'}).then(()=>window.location.href='login.html')">🚪</button></nav></header><main><div class="warehouse-controls"><div class="filter-section"><select id="locationFilter"><option value="">Все локации</option></select></div><div class="search-bar" style="margin:0"><input type="text" id="search-inv" placeholder="🔍 Поиск по товару..."></div><div id="connectionStatus" class="status-indicator online">🟢 Online</div><button class="btn btn-secondary" onclick="window.open('api/export.php?type=inventory','_blank')">📥 CSV</button><button class="btn btn-primary" onclick="window.print()">🖨️ Печать</button></div><div><h2>📊 Остатки</h2><table><thead><tr><th>Штрихкод</th><th>Товар</th><th>Локация</th><th>Кол-во</th><th>Действие</th></tr></thead><tbody id="inventoryBody"></tbody></table></div><div><h2>📜 История</h2><table><thead><tr><th>Время</th><th>Товар</th><th>Откуда</th><th>Куда</th><th>Кол-во</th><th>Тип</th></tr></thead><tbody id="movementsBody"></tbody></table></div></main></div><div id="moveModal" class="modal"><div class="modal-content"><span class="close">&times;</span><h2>Перемещение</h2><form id="moveForm"><input type="hidden" id="moveProductId"><div class="form-group"><label>Товар:</label><input type="text" id="moveProductName" readonly></div><div class="form-group"><label>Откуда:</label><input type="text" id="moveFromLocation" readonly></div><div class="form-group"><label>Куда:</label><select id="moveToLocation" required></select></div><div class="form-group"><label>Кол-во:</label><input type="number" id="moveQuantity" min="1" required></div><button type="submit" class="btn btn-primary">Переместить</button></form></div></div><script src="assets/app.js"></script><script src="assets/voice.js"></script><script>
let inv=[],loc=[],mov=[],poller=null;
const loadLoc=async()=>{loc=await App.req('warehouse.php?action=locations');const s=document.getElementById('locationFilter');if(s)s.innerHTML='<option value="">Все</option>'+loc.map(l=>`<option value="${l.id}">${l.code}-${l.name}</option>`).join('');const m=document.getElementById('moveToLocation');if(m)m.innerHTML=loc.map(l=>`<option value="${l.id}">${l.code}-${l.name}</option>`).join('')};
const loadInv=async(l='')=>{const q=document.getElementById('search-inv').value;inv=await App.req(`warehouse.php?action=inventory&location_id=${l}&search=${encodeURIComponent(q)}`);const t=document.getElementById('inventoryBody');if(!t)return;t.innerHTML=inv.length?inv.map(i=>`<tr><td>${i.barcode}</td><td>${i.name}</td><td>${i.location_code}</td><td><b>${i.quantity}</b></td><td><button class="btn btn-primary btn-sm" onclick="openMove('${i.product_id}','${i.name}','${i.location_id}','${i.location_code}',${i.quantity})">Переместить</button></td></tr>`).join(''):'<tr><td colspan="5">Нет данных</td></tr>'};
const loadMov=async()=>{mov=await App.req('warehouse.php?action=movements');const t=document.getElementById('movementsBody');if(!t)return;t.innerHTML=mov.map(m=>`<tr><td>${new Date(m.created_at).toLocaleString('ru-RU')}</td><td>${m.name}</td><td>${m.from_code||'-'}</td><td>${m.to_code||'-'}</td><td>${m.quantity}</td><td>${m.movement_type==='receive'?'📥 Приемка':'🔄 Перемещение'}</td></tr>`).join('')};
const setupModal=()=>{const m=document.getElementById('moveModal');m?.querySelector('.close').onclick=()=>m.style.display='none';window.onclick=e=>{if(e.target===m)m.style.display='none'};document.getElementById('moveForm')?.onsubmit=async e=>{e.preventDefault();await App.req('warehouse.php?action=move',{method:'POST',body:JSON.stringify({productId:document.getElementById('moveProductId').value,fromLocationId:document.getElementById('moveFromLocation').value,toLocationId:document.getElementById('moveToLocation').value,quantity:parseInt(document.getElementById('moveQuantity').value)})});alert('✅ Перемещено');m.style.display='none';loadInv();loadMov()}};
const openMove=(id,name,fid,fcode,qty)=>{document.getElementById('moveProductId').value=id;document.getElementById('moveProductName').value=name;document.getElementById('moveFromLocation').value=fid;document.getElementById('moveQuantity').value=1;document.getElementById('moveQuantity').max=qty;document.getElementById('moveModal').style.display='block'};
document.addEventListener('DOMContentLoaded',async()=>{await loadLoc();await loadInv();await loadMov();poller=App.poll(2000,()=>{loadInv();loadMov()});document.getElementById('locationFilter')?.addEventListener('change',e=>loadInv(e.target.value));document.getElementById('search-inv')?.addEventListener('input',()=>loadInv());setupModal()});
</script></body></html>
